[package]
name = "epi"
version = "0.1.0"
edition = "2021"
description = "The Master CLI for the Epi-Logos coordinate system"

[dependencies]
clap = { version = "4", features = ["derive"] }
ratatui = "0.29"
crossterm = "0.28"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
dirs = "5"
libc = "0.2"
color-eyre = "0.6"

[build-dependencies]
cc = "1"
