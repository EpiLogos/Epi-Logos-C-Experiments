coordinates:
  "#0": "The pure awareness of 'I' remains free even while the world appears within it."
  "#1": "Knowledge persists undivided throughout every act, making sequential manifestation possible."
  "#2": "Consciousness, through its inner vibration, gives rise to linked phenomena as a living chain."
  "#3": "The wave of awareness moves from diversity toward unity and returns from unity into manifestation."
  "#4": "In the supreme state there is no split between inner and outer; all shines as one mass of consciousness."
  "#5": "Blissful self-awareness pours forth will, knowledge, and action as a simultaneous whole."
  "C1": "Knowledge is the stable referent of all actions; without it no sentence or motion could coherently unfold."
  "M5": "Aesthetic rapture holds the infinite variety of things while revealing the enjoyer and enjoyed as one play."
