services:
  neo4j:
    image: neo4j:5-community
    container_name: epi-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      # neo4rs 0.9 has auth protocol issues with Neo4j 5.26 — use none for dev
      NEO4J_AUTH: none
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs

  redis:
    image: redis/redis-stack-server:latest
    container_name: epi-redis
    ports:
      - "6379:6379"
    environment:
      REDIS_ARGS: --appendonly yes
    volumes:
      - redis-data:/data

  graphiti:
    build:
      context: ./Body/S/S5/epi-gnostic
      dockerfile: Dockerfile.graphiti
    container_name: epi-graphiti
    ports:
      - "37778:37778"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ""
      NEO4J_DATABASE: neo4j
      REDIS_URL: redis://redis:6379
      GRAPHITI_PORT: "37778"
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY is required for the live Graphiti runtime}
      GNOSTIC_EMBEDDING_MODEL: ${GNOSTIC_EMBEDDING_MODEL:-gemini-embedding-2-preview}
      GNOSTIC_EMBEDDING_DIM: ${GNOSTIC_EMBEDDING_DIM:-3072}
      GNOSTIC_LLM_MODEL: ${GNOSTIC_LLM_MODEL:-gemini-3.1-flash-lite}
    depends_on:
      - neo4j
      - redis
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:37778/health', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  neo4j-data:
  neo4j-logs:
  redis-data:
